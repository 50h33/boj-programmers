name: Move LeetCode Solutions

on:
  workflow_dispatch:
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'  # LeetHub가 생성하는 폴더 패턴 (예: 0020-valid-parentheses)

permissions:
  contents: write

concurrency:
  group: move-leetcode-main
  cancel-in-progress: false

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move LeetCode solutions
        run: |
          mkdir -p "LeetCode"

          shopt -s nullglob
          for dir in [0-9][0-9][0-9][0-9]-*; do
            if [ -d "$dir" ]; then
              mkdir -p "LeetCode/$dir"
              for file in "$dir"/*; do
                git mv "$file" "LeetCode/$dir/"
              done
              rmdir "$dir" 2>/dev/null || true
            fi
          done

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add .
          git commit -m "chore: Move LeetCode solutions to LeetCode folder" || {
            echo "No changes to commit"
            exit 0
          }

          git pull --rebase origin main
          git push origin main